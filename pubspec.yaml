name: danjicar_app
description: Danjicar apartment car sharing app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  supabase_flutter: ^2.10.0
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.2
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  flutter_dotenv: ^5.2.1
  table_calendar: ^3.2.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  google_mlkit_text_recognition: ^0.15.0
  flutter_svg: ^2.3.0
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  gal: ^2.3.1
  http: ^1.2.2
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon.png
  adaptive_icon_background: "#3182F6"
  adaptive_icon_foreground: assets/brand/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/brand/danji_logo.svg
    - assets/brand/danji_logo_icon.svg
    - assets/brand/app_icon.png